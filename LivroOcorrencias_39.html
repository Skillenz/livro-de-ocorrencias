<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Livro de Ocorrências</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    html, body {
      height: 100%; margin: 0; padding: 0;
      overflow: hidden;
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
    }
    * { box-sizing: border-box; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #64748b; border-radius: 3px; }

    /* focus */
    input:focus, select:focus {
      outline: none;
      border-color: #3b82f6 !important;
      box-shadow: 0 0 0 2px rgba(59,130,246,.12);
    }

    /* table row hover */
    .rhl:hover td { filter: brightness(.97); }

    /* rich editor color option hover */
    .copt:hover { background: rgba(128,128,128,.1) !important; }

    /* contenteditable placeholder */
    [contenteditable]:empty:before {
      content: attr(data-placeholder);
      color: #94a3b8;
      pointer-events: none;
    }

    /* animations */
    @keyframes su {
      from { opacity: 0; transform: translateY(7px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .anim { animation: su .2s ease; }

    /* layout shell */
    #shell {
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background .2s, color .2s;
    }

    /* top panels never scroll */
    #top-panels { flex-shrink: 0; }

    /* table zone is the only scrollable area */
    #table-zone {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
      margin: 0 24px 16px;
      border-radius: 8px;
    }

    table { width: 100%; border-collapse: collapse; min-width: 720px; }
    th, td { text-align: left; }

    /* sticky table column headers inside scroll zone */
    thead th { position: sticky; top: 41px; z-index: 40; }

    button, label { cursor: pointer; font-family: inherit; }
    select, input, textarea { font-family: inherit; }
  </style>
</head>
<body>

<div id="shell"></div>

<script>
// ═══════════════════════════════════════════════════════════════
//  LIVRO DE OCORRÊNCIAS — standalone HTML
//  Salva tudo no localStorage do navegador.
//  Basta clicar duas vezes no arquivo para abrir.
// ═══════════════════════════════════════════════════════════════

const TIPOS = [
  { label:"BMS - HC",              color:"#1565C0" },
  { label:"BMS - JC",              color:"#0D47A1" },
  { label:"CFTV",                  color:"#37474F" },
  { label:"ELEVADORES",            color:"#827717" },
  { label:"HVAC - AJUSTE",         color:"#00838F" },
  { label:"HELIPONTO",             color:"#4E342E" },
  { label:"HVAC - CAG",            color:"#0097A7" },
  { label:"HVAC - CHILLER",        color:"#1565C0" },
  { label:"HVAC - OUTROS",         color:"#00695C" },
  { label:"MANUTENÇÃO",            color:"#2E7D32" },
  { label:"OBRAS",                 color:"#F57F17" },
  { label:"SCA",                   color:"#1A237E" },
  { label:"SDAI",                  color:"#6A1B9A" },
  { label:"SEGURANÇA",             color:"#B71C1C" },
  { label:"TURNO",                 color:"#01579B" },
  { label:"AR EXTRA",              color:"#00838F" },
  { label:"OCORRÊNCIA",            color:"#424242" },
  { label:"LIGA/DESLIGA",          color:"#E65100" },
  { label:"GERADOR",               color:"#2E7D32" },
  { label:"AJUSTE TEMPERATURA",    color:"#D84315" },
  { label:"SISTEMA EBO",           color:"#00695C" },
  { label:"SISTEMA EPO",           color:"#E65100" },
];

const TEXT_COLORS = [
  { label:"Padrão",   value:null },
  { label:"Preto",    value:"#111827" },
  { label:"Azul",     value:"#1d4ed8" },
  { label:"Vermelho", value:"#dc2626" },
  { label:"Verde",    value:"#16a34a" },
  { label:"Amarelo",  value:"#ca8a04" },
  { label:"Laranja",  value:"#ea580c" },
  { label:"Cinza",    value:"#64748b" },
];

const STORAGE_KEY      = "livro_ocorrencias_v4";
const STORAGE_DARK     = "livro_dark_mode";
const STORAGE_OPERADOR = "livro_operador_atual";

// ── helpers ──────────────────────────────────────────────────
const fmtDate = d   => { if(!d)return""; const[y,m,dd]=d.split("-"); return`${dd}/${m}/${y}`; };
const fmtTS   = iso => { if(!iso)return""; return new Date(iso).toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}); };
const fmtNow  = ()  => new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
const uid     = ()  => Date.now().toString(36)+Math.random().toString(36).slice(2);
const getTipo = l   => TIPOS.find(t=>t.label===l)||{color:"#424242"};
const strip   = h   => (h||"").replace(/<[^>]*>/g,"").trim();
const esc     = s   => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

// ── storage ───────────────────────────────────────────────────
function save(records) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(records)); return true; }
  catch(e) {
    try {
      Object.keys(localStorage).filter(k=>k!==STORAGE_KEY&&k!==STORAGE_DARK).forEach(k=>localStorage.removeItem(k));
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records)); return true;
    } catch { return false; }
  }
}
function load() {
  try { const r=localStorage.getItem(STORAGE_KEY); return r?JSON.parse(r):[]; } catch { return []; }
}

// ── app state ─────────────────────────────────────────────────
let dark    = localStorage.getItem(STORAGE_DARK)==="1";
let records = load();
let view    = "log";       // "log" | "relatorio"
let sortDir = "desc";
let editId  = null;
let inForm  = {};
let savedAt = null;
let activeColorPicker = null; // "form" | "inline" | null
let operadorAtual = localStorage.getItem(STORAGE_OPERADOR) || "";

const emptyForm = () => ({
  data: new Date().toISOString().slice(0,10),
  hora: new Date().toTimeString().slice(0,5),
  tipo:"", descricao:"", operador:operadorAtual,
  _descHTML: "",    // rich html for form editor
});
let form = emptyForm();

let hf = {tipo:"",operador:"",de:"",ate:"",hora:""};
let selectedMonth = new Date().toISOString().slice(0,7);
let panelOpen = null;
let rf = {tipo:"",operador:"",de:"",ate:""};

// persist + timestamp
function persist() {
  if(save(records)) { savedAt=fmtNow(); render(); }
}
window.addEventListener("beforeunload", ()=>save(records));

// ── filters ──────────────────────────────────────────────────
function applyF(list, f) {
  return list.filter(o=>{
    if(f.de   && o.data<f.de)  return false;
    if(f.ate  && o.data>f.ate) return false;
    if(f.tipo && o.tipo!==f.tipo) return false;
    if(f.operador && !( o.operador||"").toLowerCase().includes(f.operador.toLowerCase())) return false;
    if(f.hora && !(o.hora||"").startsWith(f.hora)) return false;
    return true;
  });
}
function sorted(list) {
  return [...list].sort((a,b)=>{
    const da=a.data+(a.hora||""), db=b.data+(b.hora||"");
    return sortDir==="desc"?db.localeCompare(da):da.localeCompare(db);
  });
}

// ── theme ────────────────────────────────────────────────────
function theme() {
  return dark ? {
    bg:"#111827", surface:"#1a2232", surface2:"#1e2a3a", border:"#2d3f55",
    text:"#e2e8f0", muted:"#64748b", faint:"#374151", inputBg:"#161e2e",
    header:"#0c1220", navAc:"#6abf40", navAcBg:"#0f2a0a",
    rEven:"#1a2232", rOdd:"#172030", thBg:"#0f1624",
    edBg:"#1e2530", edBorder:"#374151", edTbBg:"#161b24", edTc:"#e2e8f0",
  } : {
    bg:"#d6dee2", surface:"#edf1f3", surface2:"#e4ebee", border:"#b8c8d0",
    text:"#1e293b", muted:"#526270", faint:"#94a3b8", inputBg:"#fff",
    header:"#c8d4da", navAc:"#52A82C", navAcBg:"#d4edca",
    rEven:"#edf1f3", rOdd:"#e7edef", thBg:"#dde5e9",
    edBg:"#fff", edBorder:"#cbd5e1", edTbBg:"#f8fafc", edTc:"#1e293b",
  };
}

// ── toast ────────────────────────────────────────────────────
let toastTimer = null;
function toast(msg, type="ok") {
  const el = document.getElementById("toast");
  if(!el) return;
  const colors = {
    ok:   { bg:"#f0fdf4", bd:"#bbf7d0", tx:"#16a34a" },
    err:  { bg:"#fef2f2", bd:"#fca5a5", tx:"#dc2626" },
    info: { bg:"#eff6ff", bd:"#bfdbfe", tx:"#2563eb" },
  };
  const c = colors[type]||colors.ok;
  el.style.cssText = `position:fixed;bottom:18px;right:18px;border:1px solid ${c.bd};border-radius:6px;padding:9px 16px;font-size:11px;font-weight:600;z-index:999;font-family:inherit;animation:su .2s ease;background:${c.bg};color:${c.tx};display:block;`;
  el.textContent = msg;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ el.style.display="none"; }, 3200);
}

// ── CSV ──────────────────────────────────────────────────────
function buildCSV(list) {
  const header = ["DATA","HORA","TIPO","OPERADOR","DESCRIÇÃO","REGISTRADO EM"];
  const rows = sorted(list).map(o=>[
    fmtDate(o.data), o.hora||"", o.tipo, o.operador||"",
    '"'+strip(o.descricao).replace(/"/g,'""')+'"',
    fmtTS(o.createdAt),
  ]);
  return [header,...rows].map(r=>r.join(";")).join("\n");
}
function exportCSV() {
  const list = (rf.de||rf.ate||rf.tipo||rf.operador)?applyF(records,rf):records;
  const blob = new Blob(["\uFEFF"+buildCSV(list)],{type:"text/csv;charset=utf-8;"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "ocorrencias_"+new Date().toISOString().slice(0,10)+".csv";
  a.click(); URL.revokeObjectURL(a.href);
  toast("CSV exportado!");
}
function saveBackup() {
  const blob = new Blob([JSON.stringify(records,null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "livro_backup_"+new Date().toISOString().slice(0,10)+".json";
  a.click(); URL.revokeObjectURL(a.href);
  toast("Backup JSON salvo!");
}
function importFile(e) {
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(!Array.isArray(d))throw new Error();
      records=d; persist(); toast(d.length+" registros importados.");
    } catch{ toast("Arquivo inválido.","err"); }
  };
  r.readAsText(f); e.target.value="";
}

// ── render helpers ────────────────────────────────────────────
function inp(id, type, val, placeholder, extraStyle) {
  const T=theme();
  const base=`background:${T.inputBg};border:1px solid ${T.border};border-radius:5px;color:${T.text};padding:8px 11px;font-size:13px;font-family:inherit;width:100%;${extraStyle||""}`;
  if(type==="select") {
    // val is [options array], selected is placeholder
    return ""; // handled separately
  }
  return `<input id="${id}" type="${type}" value="${esc(val)}" placeholder="${esc(placeholder||"")}" style="${base}" oninput="onInput('${id}')">`;
}

function richEditorHTML(id, html, T) {
  const colorBtns = TEXT_COLORS.map(c=>`
    <button class="copt" onmousedown="event.preventDefault();applyColor('${id}',${c.value?`'${c.value}'`:'null'})"
      style="display:flex;align-items:center;gap:7px;background:none;border:none;cursor:pointer;padding:5px 5px;border-radius:4px;font-size:12px;font-family:inherit;color:${T.edTc};width:100%;text-align:left;">
      <span style="width:12px;height:12px;border-radius:50%;background:${c.value||"transparent"};border:1px solid ${T.edBorder};display:inline-block;flex-shrink:0;"></span>
      ${c.label}
    </button>`).join("");

  return `
  <div style="border:1px solid ${T.edBorder};border-radius:6px;background:${T.edBg};">
    <div style="display:flex;align-items:center;gap:4px;padding:4px 8px;border-bottom:1px solid ${T.edBorder};background:${T.edTbBg};flex-wrap:wrap;">
      <button style="background:none;border:1px solid ${T.edBorder};border-radius:4px;padding:3px 9px;cursor:pointer;font-family:inherit;color:${T.edTc};line-height:1;" onmousedown="event.preventDefault();edExec('${id}','bold')"><b>B</b></button>
      <button style="background:none;border:1px solid ${T.edBorder};border-radius:4px;padding:3px 9px;cursor:pointer;font-family:inherit;color:${T.edTc};line-height:1;" onmousedown="event.preventDefault();edExec('${id}','italic')"><i>I</i></button>
      <button style="background:none;border:1px solid ${T.edBorder};border-radius:4px;padding:3px 9px;cursor:pointer;font-family:inherit;color:${T.edTc};line-height:1;" onmousedown="event.preventDefault();edExec('${id}','underline')"><u>U</u></button>
      <div style="width:1px;height:18px;background:${T.edBorder};margin:0 2px;"></div>
      <div style="position:relative;">
        <button id="${id}-cpbtn" style="background:none;border:1px solid ${T.edBorder};border-radius:4px;padding:3px 9px;cursor:pointer;font-family:inherit;color:${T.edTc};line-height:1;display:flex;align-items:center;gap:5px;"
          onmousedown="event.preventDefault();toggleCP('${id}')">
          <span id="${id}-cplabel" style="font-weight:700;color:${T.edTc};border-bottom:2px solid ${T.edTc};line-height:1;font-size:13px;">A</span>
          <span style="font-size:9px;color:#94a3b8;">▼</span>
        </button>
        <div id="${id}-cpdrop" style="display:none;position:absolute;top:110%;left:0;z-index:800;background:${T.edBg};border:1px solid ${T.edBorder};border-radius:7px;padding:8px 10px;box-shadow:0 6px 20px rgba(0,0,0,.18);min-width:135px;">
          <div style="font-size:9px;font-weight:700;letter-spacing:.1em;color:#94a3b8;margin-bottom:6px;">COR DO TEXTO</div>
          ${colorBtns}
        </div>
      </div>
      <div style="width:1px;height:18px;background:${T.edBorder};margin:0 2px;"></div>
      <button style="background:none;border:1px solid ${T.edBorder};border-radius:4px;padding:3px 10px;cursor:pointer;font-family:inherit;color:${T.edTc};line-height:1;font-size:11px;"
        onmousedown="event.preventDefault();edExec('${id}','removeFormat');resetCPLabel('${id}')">Sem Formatação</button>
    </div>
    <div id="${id}" contenteditable="true" data-placeholder="Descreva detalhadamente a ocorrência, incluindo circunstâncias, envolvidos e medidas tomadas..."
      oninput="onEditorInput('${id}')"
      style="min-height:58px;padding:6px 10px;font-size:13px;line-height:1.7;color:${T.edTc};outline:none;font-family:'IBM Plex Mono','Courier New',monospace;word-break:break-word;background:${T.edBg};"
    >${html||""}</div>
  </div>`;
}

// ── editor helpers ────────────────────────────────────────────
function edExec(id, cmd, val) {
  const el=document.getElementById(id);
  if(!el)return;
  el.focus();
  document.execCommand(cmd,false,val||null);
  onEditorInput(id);
}
function toggleCP(id) {
  const drop=document.getElementById(id+"-cpdrop");
  if(!drop)return;
  const visible=drop.style.display!=="none";
  // close all open pickers first
  document.querySelectorAll("[id$='-cpdrop']").forEach(d=>d.style.display="none");
  if(!visible) drop.style.display="block";
}
function applyColor(id, color) {
  const drop=document.getElementById(id+"-cpdrop");
  if(drop) drop.style.display="none";
  const label=document.getElementById(id+"-cplabel");
  if(label){ label.style.color=color||theme().edTc; label.style.borderBottomColor=color||theme().edTc; }
  edExec(id,"foreColor",color||theme().edTc);
}
function resetCPLabel(id) {
  const label=document.getElementById(id+"-cplabel");
  if(label){ label.style.color=theme().edTc; label.style.borderBottomColor=theme().edTc; }
  onEditorInput(id);
}
function onEditorInput(id) {
  const el=document.getElementById(id);
  if(!el)return;
  if(id==="form-desc") {
    form.descricao=el.innerHTML;
  } else if(id==="inline-desc") {
    inForm.descricao=el.innerHTML;
  }
}

// close color pickers when clicking outside
document.addEventListener("mousedown", e=>{
  if(!e.target.closest("[id$='-cpdrop']") && !e.target.closest("[id$='-cpbtn']")) {
    document.querySelectorAll("[id$='-cpdrop']").forEach(d=>d.style.display="none");
  }
});

// ── input binding ─────────────────────────────────────────────
function onInput(id) {
  const el=document.getElementById(id); if(!el)return;
  const v=el.value;
  if(id==="f-data")    { form.data=v; return; }
  if(id==="f-hora")    { form.hora=v; return; }
  if(id==="f-tipo")    { form.tipo=v; render(); return; }
  if(id==="f-oper")    { form.operador=v; return; }
  // history filters
  if(id==="hf-tipo")   { hf.tipo=v; render(); return; }
  if(id==="hf-oper")   { hf.operador=v; render(); return; }
  if(id==="hf-de")     { hf.de=v; render(); return; }
  if(id==="hf-ate")    { hf.ate=v; render(); return; }
  if(id==="hf-hora")   { hf.hora=v; render(); return; }
  // report filters
  if(id==="rf-de")     { rf.de=v; render(); return; }
  if(id==="rf-ate")    { rf.ate=v; render(); return; }
  if(id==="rf-tipo")   { rf.tipo=v; render(); return; }
  if(id==="rf-oper")   { rf.operador=v; render(); return; }
  // inline edit
  if(id==="ie-data")   { inForm.data=v; return; }
  if(id==="ie-hora")   { inForm.hora=v; return; }
  if(id==="ie-tipo")   { inForm.tipo=v; render(); return; }
  if(id==="ie-oper")   { inForm.operador=v; return; }
}

// ── CRUD ──────────────────────────────────────────────────────
function addRecord() {
  const descEl=document.getElementById("form-desc");
  if(descEl) form.descricao=descEl.innerHTML;
  if(!form.data||!form.tipo||!strip(form.descricao)){
    toast("Preencha data, tipo e descrição.","err"); return;
  }
  records.unshift({...form, id:uid(), createdAt:new Date().toISOString()});
  persist();
  const prevOp=form.operador;
  form=emptyForm(); form.operador=prevOp;
  panelOpen=null;
  toast("Ocorrência registrada.");
  render();
}

function startEdit(id) {
  const o=records.find(r=>r.id===id); if(!o)return;
  editId=id;
  inForm={data:o.data,hora:o.hora,tipo:o.tipo,descricao:o.descricao,operador:o.operador||""};
  render();
  // set rich editor content after render
  setTimeout(()=>{
    const el=document.getElementById("inline-desc");
    if(el){ el.innerHTML=inForm.descricao||""; }
  },0);
}
function saveEdit() {
  const descEl=document.getElementById("inline-desc");
  if(descEl) inForm.descricao=descEl.innerHTML;
  if(!inForm.data||!inForm.tipo||!strip(inForm.descricao)){
    toast("Preencha todos os campos.","err"); return;
  }
  records=records.map(o=>o.id===editId?{...o,...inForm,updatedAt:new Date().toISOString()}:o);
  editId=null; persist(); toast("Atualizado."); render();
}
function cancelEdit() { editId=null; render(); }

let pendingDelete=null;
function confirmDelete(id) {
  pendingDelete=id;
  document.getElementById("modal").style.display="flex";
}
function doDelete() {
  records=records.filter(o=>o.id!==pendingDelete);
  pendingDelete=null;
  document.getElementById("modal").style.display="none";
  persist(); toast("Excluído.","info"); render();
}
function cancelDelete() {
  pendingDelete=null;
  document.getElementById("modal").style.display="none";
}

function setView(v)    { view=v;    render(); }
function setSortDir()  { sortDir=sortDir==="desc"?"asc":"desc"; render(); }
function clearHF()     { hf={tipo:"",operador:"",de:"",ate:"",hora:""}; render(); }
function setMonth(v)   { selectedMonth=v; render(); }
function toggleDark()  { dark=!dark; localStorage.setItem(STORAGE_DARK,dark?"1":"0"); render(); }
function togglePanel(name) { panelOpen = (panelOpen===name)?null:name; render(); }
function setOperador(nome) { operadorAtual = nome; localStorage.setItem(STORAGE_OPERADOR, nome); form.operador = nome; render(); }
function deleteOperador(nome) {
  if(confirm(`Deletar operador "${nome}"?`)) {
    records = records.filter(r => r.operador !== nome);
    if(operadorAtual === nome) { operadorAtual = ""; localStorage.setItem(STORAGE_OPERADOR, ""); form.operador = ""; }
    save(records); render();
  }
}
function addOperador() {
  const nome = document.getElementById('novo-oper').value.trim();
  if(nome) { setOperador(nome); document.getElementById('novo-oper').value = ""; panelOpen = null; render(); }
}

// ── SELECT helper ──────────────────────────────────────────────
function selectHTML(id, selected, options, extraStyle, onChange) {
  const T=theme();
  const style=`background:${T.inputBg};border:1px solid ${T.border};border-radius:5px;color:${selected?T.text:T.faint};padding:8px 11px;font-size:13px;font-family:inherit;width:100%;cursor:pointer;${extraStyle||""}`;
  const opts=options.map(o=>`<option value="${esc(o.value||o)}" ${(o.value||o)===selected?"selected":""}>${esc(o.label||o)}</option>`).join("");
  return `<select id="${id}" style="${style}" onchange="onInput('${id}')">${opts}</select>`;
}
function tipoOptions(blank) {
  return [blank||"", ...TIPOS.map(t=>({value:t.label,label:t.label}))];
}

// ── MAIN RENDER ───────────────────────────────────────────────
function render() {
  const T=theme();
  const shell=document.getElementById("shell");

  // apply dark/light calendar icon filter globally
  const styleTag=document.getElementById("dyn-style")||document.createElement("style");
  styleTag.id="dyn-style";
  styleTag.textContent=`
    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator{cursor:pointer;opacity:.5;filter:${dark?"invert(1)":"none"};}
    select option{background:${T.inputBg};color:${T.text};}
  `;
  if(!document.getElementById("dyn-style")) document.head.appendChild(styleTag);

  // Filter history by selected month
  const histList  = applyF(records,hf).filter(o=> !selectedMonth || (o.data||"").startsWith(selectedMonth));
  const relList   = applyF(records,rf);
  const tableData = view==="relatorio"?relList:histList;
  const rows      = sorted(tableData);

  // ── summary for relatorio ──
  const topTipos = TIPOS.map(t=>({...t,count:relList.filter(o=>o.tipo===t.label).length})).filter(t=>t.count>0).sort((a,b)=>b.count-a.count);
  const summaryHTML = topTipos.length>0 ? `
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;">
      <div style="background:${T.surface2};border:1px solid ${T.border};border-radius:6px;padding:9px 16px;">
        <div style="font-size:22px;font-weight:700;color:${T.navAc};">${relList.length}</div>
        <div style="font-size:9px;color:${T.muted};margin-top:3px;">TOTAL</div>
      </div>
      ${topTipos.slice(0,5).map(t=>`
        <div style="background:${T.surface2};border:1px solid ${T.border};border-radius:6px;padding:9px 14px;">
          <div style="font-size:20px;font-weight:700;color:${T.navAc};">${t.count}</div>
          <div style="font-size:9px;color:${T.muted};margin-top:3px;max-width:120px;">${esc(t.label)}</div>
        </div>`).join("")}
    </div>` : "";

  // ── table rows ──
  const colHeaders = ["DATA","HORA","TIPO DE OCORRÊNCIA","OPERADOR","DESCRIÇÃO",...(view==="log"?["AÇÕES"]:[])];
  const thStyle = `padding:6px 10px;font-size:9px;font-weight:700;letter-spacing:.12em;color:#fff;text-align:left;border-bottom:1px solid ${T.border};white-space:nowrap;background:${T.navAc};`;
  const thNarrow = `padding:6px 10px;font-size:9px;font-weight:700;letter-spacing:.12em;color:#fff;text-align:left;border-bottom:1px solid ${T.border};white-space:nowrap;background:${T.navAc};width:1%;`;

  const tableRows = rows.map((o,i)=>{
    const tp=getTipo(o.tipo);
    const isEdit=editId===o.id;
    const rowBg=i%2===0?T.rEven:T.rOdd;
    const tdBase=`padding:6px 10px;border-bottom:1px solid ${T.border};vertical-align:top;`;

    let dataTd, horaTd, tipoTd, operTd, descTd, actionTd="";

    if(isEdit){
      dataTd=`<td style="${tdBase}white-space:nowrap;"><input id="ie-data" type="date" value="${esc(inForm.data)}" oninput="onInput('ie-data')" style="background:${T.inputBg};border:1px solid ${T.border};border-radius:5px;color:${T.text};padding:5px 7px;font-size:12px;font-family:inherit;width:135px;"></td>`;
      horaTd=`<td style="${tdBase}"><input id="ie-hora" type="time" value="${esc(inForm.hora)}" oninput="onInput('ie-hora')" style="background:${T.inputBg};border:1px solid ${T.border};border-radius:5px;color:${T.text};padding:5px 7px;font-size:12px;font-family:inherit;width:100px;"></td>`;
      const tipoSel=`<select id="ie-tipo" onchange="onInput('ie-tipo')" style="background:${T.inputBg};border:1px solid ${T.border};border-radius:5px;color:${T.text};padding:5px 7px;font-size:11px;font-family:inherit;width:160px;cursor:pointer;">
        <option value="">—</option>${TIPOS.map(t=>`<option value="${esc(t.label)}" ${t.label===inForm.tipo?"selected":""}>${esc(t.label)}</option>`).join("")}
      </select>`;
      tipoTd=`<td style="${tdBase}">${tipoSel}</td>`;
      operTd=`<td style="${tdBase}"><input id="ie-oper" type="text" value="${esc(inForm.operador)}" placeholder="Operador" oninput="onInput('ie-oper')" style="background:${T.inputBg};border:1px solid ${T.border};border-radius:5px;color:${T.text};padding:5px 7px;font-size:12px;font-family:inherit;width:135px;"></td>`;
      descTd=`<td style="${tdBase}font-size:12px;line-height:1.5;min-width:200px;">${richEditorHTML("inline-desc","",T)}</td>`;
      actionTd=`<td style="${tdBase}white-space:nowrap;">
        <div style="display:flex;gap:5px;">
          <button onclick="saveEdit()" style="background:#2563eb;color:#fff;border:none;border-radius:4px;padding:5px 10px;cursor:pointer;font-size:11px;font-family:inherit;font-weight:700;">✓</button>
          <button onclick="cancelEdit()" style="background:none;border:1px solid ${T.border};border-radius:4px;padding:5px 10px;cursor:pointer;font-size:11px;color:${T.muted};font-family:inherit;">✕</button>
        </div></td>`;
    } else {
      dataTd=`<td style="${tdBase}white-space:nowrap;"><span style="font-family:monospace;font-size:11px;font-weight:600;color:${T.text};">${fmtDate(o.data)}</span></td>`;
      horaTd=`<td style="${tdBase}white-space:nowrap;width:1%;"><span style="font-family:monospace;font-size:11px;color:${T.muted};">${esc(o.hora)||"—"}</span></td>`;
      tipoTd=`<td style="${tdBase}white-space:nowrap;width:1%;"><span style="display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;color:#fff;white-space:nowrap;background:${tp.color};">${esc(o.tipo)}</span></td>`;
      operTd=`<td style="${tdBase}white-space:nowrap;width:1%;"><span style="font-size:10px;color:${T.muted};">${esc(o.operador)||"—"}</span></td>`;
      descTd=`<td style="${tdBase}font-size:12px;line-height:1.5;min-width:200px;">${o.descricao||"—"}</td>`;
      if(view==="log") {
        actionTd=`<td style="${tdBase}white-space:nowrap;">
          <div style="display:flex;gap:5px;">
            <button onclick="startEdit('${o.id}')" title="Editar" style="background:none;border:1px solid ${T.border};border-radius:4px;padding:4px 8px;cursor:pointer;font-size:12px;">✏️</button>
            <button onclick="confirmDelete('${o.id}')" title="Excluir" style="background:none;border:1px solid ${T.border};border-radius:4px;padding:4px 8px;cursor:pointer;font-size:12px;">🗑️</button>
          </div></td>`;
      }
    }

    return `<tr class="rhl" style="background:${rowBg};">${dataTd}${horaTd}${tipoTd}${operTd}${descTd}${actionTd}</tr>`;
  }).join("");

  // ── tipo selector for form ──
  const tipoFormSel=`<select id="f-tipo" onchange="onInput('f-tipo')" style="background:${T.inputBg};border:1px solid ${T.border};border-radius:5px;color:${form.tipo?T.text:T.faint};padding:5px 8px;font-size:11px;font-family:inherit;width:100%;cursor:pointer;">
    <option value="">— Selecione —</option>
    ${TIPOS.map(t=>`<option value="${esc(t.label)}" ${t.label===form.tipo?"selected":""}>${esc(t.label)}</option>`).join("")}
  </select>`;

  // ── tipo selectors for filters ──
  const mkTipoSel=(id,val)=>`<select id="${id}" onchange="onInput('${id}')" style="background:${T.inputBg};border:1px solid ${T.border};border-radius:5px;color:${T.text};padding:5px 8px;font-size:11px;font-family:inherit;width:100%;cursor:pointer;">
    <option value="">Todos</option>
    ${TIPOS.map(t=>`<option value="${esc(t.label)}" ${t.label===val?"selected":""}>${esc(t.label)}</option>`).join("")}
  </select>`;
  const mkOperSel=(id,val)=>{ const names=[...new Set(records.map(o=>o.operador||'').filter(Boolean))].sort(); const opts=names.map(n=>`<option value="${esc(n)}" ${n===val?'selected':''}>${esc(n)}</option>`).join(''); return `<select id="${id}" onchange="onInput('${id}')" style="background:${T.inputBg};border:1px solid ${T.border};border-radius:5px;color:${T.text};padding:5px 8px;font-size:11px;font-family:inherit;width:100%;cursor:pointer;"><option value="">Todos</option>${opts}</select>`; };

  const INP=(id,type,val,ph,extra)=>`<input id="${id}" type="${type}" value="${esc(val)}" placeholder="${esc(ph||"")}" style="background:${T.inputBg};border:1px solid ${T.border};border-radius:5px;color:${T.text};padding:5px 8px;font-size:11px;font-family:inherit;width:100%;${extra||""}" oninput="onInput('${id}')">`;
  const LBL=txt=>`<label style="font-size:9px;font-weight:700;letter-spacing:.1em;color:${T.muted};margin-bottom:3px;display:block;">${txt}</label>`;
  const CARD=content=>`<div class="anim" style="background:${T.surface};border:1px solid ${T.border};border-radius:8px;padding:10px 14px;margin-bottom:8px;box-shadow:${dark?"0 2px 8px rgba(0,0,0,.3)":"0 1px 4px rgba(0,0,0,.07)"};">${content}</div>`;

  // ── full HTML ──
  shell.style.cssText=`height:100vh;display:flex;flex-direction:column;overflow:hidden;background:${T.bg};color:${T.text};font-size:13px;`;

  shell.innerHTML = `
  <!-- HEADER -->
  <div style="flex-shrink:0;background:${T.header};border-bottom:1px solid ${T.border};box-shadow:${dark?"0 2px 8px rgba(0,0,0,.4)":"0 1px 4px rgba(0,0,0,.08)"};z-index:200;">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:13px 26px;flex-wrap:wrap;gap:8px;">
      <div style="display:flex;align-items:center;gap:11px;">
        <span style="font-size:24px;">📋</span>
        <div>
          <div style="font-size:18px;font-weight:700;letter-spacing:.12em;color:${T.navAc};">LIVRO DE OCORRÊNCIAS</div>
          <div style="font-size:9px;color:${T.muted};letter-spacing:.1em;margin-top:2px;">REGISTRO OPERACIONAL DE TURNO</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <span style="font-size:9px;color:${T.muted};display:flex;align-items:center;gap:4px;">
          <span style="width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block;flex-shrink:0;"></span>
          ${savedAt?"Salvo às "+savedAt:"Pronto"}
        </span>
        <span style="font-size:10px;background:${T.surface2};color:${T.muted};padding:2px 9px;border-radius:4px;border:1px solid ${T.border};">${records.length} reg.</span>
        <button onclick="toggleDark()" style="background:${dark?"#38bdf8":"#1e293b"};border:none;border-radius:16px;padding:4px 13px;cursor:pointer;font-size:10px;font-weight:700;color:${dark?"#0f172a":"#fff"};font-family:inherit;">${dark?"☀ Claro":"🌙 Escuro"}</button>
        <button onclick="saveBackup()" style="background:none;border:1px solid ${T.border};border-radius:4px;padding:4px 11px;cursor:pointer;font-size:10px;color:${T.muted};font-family:inherit;">💾 Backup</button>
        <label style="background:none;border:1px solid ${T.border};border-radius:4px;padding:4px 11px;cursor:pointer;font-size:10px;color:${T.muted};font-family:inherit;display:inline-flex;gap:3px;align-items:center;">
          📂 Importar<input type="file" accept=".json" style="display:none;" onchange="importFile(event)">
        </label>
      </div>
    </div>
  </div>

  <!-- TOP PANELS (never scroll) -->
  <div id="top-panels" style="flex-shrink:0;padding:0;background:${T.bg};z-index:100;">

    ${view==="log" ? `
    <div style="padding:8px 18px;background:${T.surface};border-bottom:1px solid ${T.border};display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <div style="display:flex;align-items:center;gap:4px;">
        <span style="font-size:9px;font-weight:700;color:${T.muted};">👤 OPERADOR EM TURNO:</span>
        <span style="font-size:10px;font-weight:700;color:${T.navAc};">${operadorAtual||"—"}</span>
      </div>
      <button onclick="togglePanel('operador')" style="background:none;border:1px solid ${T.border};padding:3px 8px;border-radius:4px;cursor:pointer;font-size:9px;color:${T.muted};font-family:inherit;">ALTERAR</button>
      ${panelOpen==='operador' ? `
      <div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap;">
        <select onchange="if(this.value){setOperador(this.value);togglePanel(null);render();}" style="background:${T.inputBg};border:1px solid ${T.border};padding:4px 8px;border-radius:4px;font-size:9px;color:${T.text};font-family:inherit;cursor:pointer;">
          <option value="">— Selecione operador —</option>
          ${[...new Set(records.map(o=>o.operador||'').filter(Boolean))].sort().map(nome=>`
            <option value="${esc(nome)}">${esc(nome)}</option>
          `).join('')}
        </select>
        <div style="display:flex;gap:4px;">
          <input type="text" id="novo-oper" placeholder="Novo operador" style="background:${T.inputBg};border:1px solid ${T.border};padding:4px 8px;border-radius:4px;font-size:9px;color:${T.text};font-family:inherit;" onkeydown="if(event.key==='Enter')addOperador();">
          <button onclick="addOperador()" style="background:${T.navAc};border:none;color:#fff;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:9px;font-weight:700;font-family:inherit;">+ ADD</button>
        </div>
        <select id="del-oper" onchange="if(this.value){deleteOperador(this.value);this.value='';}" style="background:${T.inputBg};border:1px solid ${T.border};padding:4px 8px;border-radius:4px;font-size:9px;color:${T.text};font-family:inherit;cursor:pointer;">
          <option value="">— Remover operador —</option>
          ${[...new Set(records.map(o=>o.operador||'').filter(Boolean))].sort().map(nome=>`
            <option value="${esc(nome)}">${esc(nome)}</option>
          `).join('')}
        </select>
      </div>
      ` : ""}
    </div>
    ` : ""}

    <!-- Botões compactos -->
    <div style="padding:4px 18px;display:flex;gap:6px;align-items:center;justify-content:space-between;">
      <div style="display:flex;gap:6px;align-items:center;">
        ${view==="log" ? `
        <button onclick="togglePanel('nova')" style="background:none;border:1px solid ${T.border};padding:3px 8px;border-radius:4px;cursor:pointer;font-size:9px;font-weight:700;color:${T.muted};font-family:inherit;user-select:none;">➕ NOVA OCORRÊNCIA</button>
        <button onclick="togglePanel('filtros')" style="background:none;border:1px solid ${T.border};padding:3px 8px;border-radius:4px;cursor:pointer;font-size:9px;font-weight:700;color:${T.muted};font-family:inherit;user-select:none;">🔍 FILTRAR${(hf.tipo||hf.operador||hf.de||hf.ate||hf.hora)?' ●':''}</button>
        ` : `
        <button onclick="togglePanel('rfiltros')" style="background:none;border:1px solid ${T.border};padding:3px 8px;border-radius:4px;cursor:pointer;font-size:9px;font-weight:700;color:${T.muted};font-family:inherit;user-select:none;">🔍 PERÍODO</button>
        <button onclick="event.stopPropagation();exportCSV()" style="background:none;border:1px solid ${T.border};color:${T.muted};border-radius:4px;padding:3px 8px;font-size:9px;font-weight:700;cursor:pointer;font-family:inherit;">⬇ CSV</button>
        `}
      </div>
      <div style="display:flex;gap:1px;">
        <button onclick="setView('log')" style="background:none;border:none;font-size:9px;font-weight:700;letter-spacing:.08em;padding:3px 10px;cursor:pointer;font-family:inherit;border-radius:4px;color:${view==="log"?T.navAc:T.muted};background:${view==="log"?T.navAcBg:"transparent"};border-bottom:2px solid ${view==="log"?T.navAc:"transparent"};">REGISTRO</button>
        <button onclick="setView('relatorio')" style="background:none;border:none;font-size:9px;font-weight:700;letter-spacing:.08em;padding:3px 10px;cursor:pointer;font-family:inherit;border-radius:4px;color:${view==="relatorio"?T.navAc:T.muted};background:${view==="relatorio"?T.navAcBg:"transparent"};border-bottom:2px solid ${view==="relatorio"?T.navAc:"transparent"};">RELATÓRIOS</button>
      </div>
    </div>

    <!-- Painéis - mostrados abaixo dos botões quando abertos -->
    ${view==="log" ? `
    ${panelOpen==='nova' ? `<div style="padding:12px 18px;background:${T.surface};border-top:1px solid ${T.border};border-bottom:1px solid ${T.border};">
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px;">
        <div>${LBL("DATA")}${INP("f-data","date",form.data)}</div>
        <div>${LBL("HORA")}${INP("f-hora","time",form.hora)}</div>
        <div>${LBL("TIPO DE OCORRÊNCIA")}${tipoFormSel}</div>
        <div>${LBL("OPERADOR")}${INP("f-oper","text",form.operador,"Nome do operador")}</div>
        <div style="grid-column:1/-1;">${LBL("DESCRIÇÃO DA OCORRÊNCIA")}${richEditorHTML("form-desc",form.descricao,T)}</div>
      </div>
      <div style="margin-top:8px;display:flex;justify-content:flex-end;">
        <button onclick="addRecord()" style="background:${T.navAc};color:#fff;border:none;border-radius:5px;padding:6px 16px;font-size:9px;font-weight:700;cursor:pointer;font-family:inherit;">REGISTRAR</button>
      </div>
    </div>` : ""}
    ${panelOpen==='filtros' ? `<div style="padding:12px 18px;background:${T.surface};border-bottom:1px solid ${T.border};">
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;align-items:end;">
        <div>${LBL("TIPO")}${mkTipoSel("hf-tipo",hf.tipo)}</div>
        <div>${LBL("OPERADOR")}${mkOperSel("hf-oper",hf.operador)}</div>
        <div>${LBL("DATA INICIAL")}${INP("hf-de","date",hf.de)}</div>
        <div>${LBL("DATA FINAL")}${INP("hf-ate","date",hf.ate)}</div>
        <div>${LBL("HORA")}${INP("hf-hora","time",hf.hora)}</div>
        <div style="display:flex;align-items:flex-end;">
          <button onclick="clearHF()" style="width:100%;background:none;border:1px solid ${T.border};color:${T.muted};border-radius:4px;padding:4px;font-size:9px;cursor:pointer;font-family:inherit;">✕ Limpar</button>
        </div>
      </div>
      <div style="margin-top:4px;font-size:9px;color:${T.muted};">${histList.length} de ${records.length} registros</div>
    </div>` : ""}
    ` : `
    ${panelOpen==='rfiltros' ? `<div style="padding:12px 18px;background:${T.surface};border-bottom:1px solid ${T.border};">
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:12px;">
        <div>${LBL("DATA INICIAL")}${INP("rf-de","date",rf.de)}</div>
        <div>${LBL("DATA FINAL")}${INP("rf-ate","date",rf.ate)}</div>
        <div>${LBL("TIPO")}${mkTipoSel("rf-tipo",rf.tipo)}</div>
        <div>${LBL("OPERADOR")}${INP("rf-oper","text",rf.operador,"Filtrar por operador")}</div>
      </div>
      ${summaryHTML}
    </div>` : ""}
    `}
  </div>>

  <!-- TABLE ZONE (único scroll) -->
  <div id="table-zone" style="flex:1;overflow-y:auto;overflow-x:auto;margin:0 18px 10px;background:${T.surface};border:1px solid ${T.border};border-radius:8px;box-shadow:${dark?"0 2px 8px rgba(0,0,0,.25)":"0 1px 4px rgba(0,0,0,.06)"};">
    <!-- sticky bar -->
    <div style="position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:7px 14px;background:${T.thBg};border-bottom:1px solid ${T.border};">
      <span style="font-size:10px;font-weight:700;letter-spacing:.1em;color:${T.muted};white-space:nowrap;">
        ${view==="relatorio"?"RELATÓRIO — "+relList.length+" REGISTROS":"HISTÓRICO — "+histList.length+" DE "+records.length}
      </span>
      ${view==="log" ? (()=>{
        const monthSet=new Set(records.map(o=>(o.data||"").slice(0,7)).filter(Boolean));
        monthSet.add(new Date().toISOString().slice(0,7));
        const months=Array.from(monthSet).sort((a,b)=>b.localeCompare(a));
        const mLabel=m=>{ const [y,mo]=m.split("-"); return ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"][parseInt(mo,10)-1]+" "+y; };
        const opts=months.map(m=>`<option value="${m}" ${m===selectedMonth?"selected":""} >${mLabel(m)}</option>`).join("");
        return `<select onchange="setMonth(this.value)" style="background:${T.inputBg};border:1px solid ${T.border};border-radius:5px;color:${T.text};padding:4px 8px;font-size:11px;font-family:inherit;cursor:pointer;font-weight:600;"><option value="" ${!selectedMonth?"selected":""}>Todos os meses</option>${opts}</select>`;
      })() : ""}
      <button onclick="setSortDir()" style="background:none;border:1px solid ${T.border};color:${T.muted};font-size:10px;padding:3px 10px;cursor:pointer;border-radius:4px;font-family:inherit;margin-left:auto;white-space:nowrap;">
        ${sortDir==="desc"?"↓ Mais recente":"↑ Mais antigo"}
      </button>
    </div>

    ${rows.length===0 ? `
      <div style="text-align:center;padding:52px 20px;color:${T.faint};">
        <div style="font-size:32px;margin-bottom:10px;">📂</div>
        <div style="font-size:11px;">Nenhuma ocorrência encontrada</div>
      </div>` : `
      <table style="width:100%;border-collapse:collapse;min-width:720px;">
        <thead>
          <tr>${colHeaders.map(h=>`<th style="${["DATA","HORA","TIPO DE OCORRÊNCIA","OPERADOR","AÇÕES"].includes(h)?thNarrow:thStyle}">${h}</th>`).join("")}</tr>
        </thead>
        <tbody>${tableRows}</tbody>
      </table>`}
  </div>

  <!-- TOAST -->
  <div id="toast" style="display:none;"></div>

  <!-- MODAL DELETE -->
  <div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center;z-index:300;">
    <div style="background:${T.surface};border:1px solid ${T.border};border-radius:10px;padding:26px 30px;min-width:300px;box-shadow:0 8px 32px rgba(0,0,0,.2);">
      <div style="font-size:14px;font-weight:700;margin-bottom:8px;color:${T.text};">⚠️ Confirmar Exclusão</div>
      <div style="font-size:12px;color:${T.muted};margin-bottom:20px;">Deseja excluir este registro permanentemente?</div>
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button onclick="cancelDelete()" style="background:none;border:1px solid ${T.border};color:${T.muted};border-radius:5px;padding:7px 16px;font-size:12px;cursor:pointer;font-family:inherit;">Cancelar</button>
        <button onclick="doDelete()" style="background:#dc2626;color:#fff;border:none;border-radius:5px;padding:7px 16px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:700;">Excluir</button>
      </div>
    </div>
  </div>
  `;

  // restore inline editor content after re-render
  if(editId) {
    setTimeout(()=>{
      const el=document.getElementById("inline-desc");
      if(el && !el.innerHTML) el.innerHTML=inForm.descricao||"";
    },0);
  }
}

// ── INIT ──────────────────────────────────────────────────────
render();
// mark as saved on load if data exists
if(records.length>0) { savedAt=fmtNow(); }
</script>
</body>
</html>
