<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Livro de Ocorrências</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%2352A82C'/><text x='50' y='65' font-size='60' font-weight='bold' fill='white' text-anchor='middle' font-family='Arial'>📋</text></svg>"/>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    html, body {
      height: 100%; margin: 0; padding: 0;
      overflow: hidden;
      font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { box-sizing: border-box; }

    /* scrollbar - otimizado para telas pequenas */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #64748b; border-radius: 3px; }

    /* focus */
    input:focus, select:focus {
      outline: none;
      border-color: #3b82f6 !important;
      box-shadow: 0 0 0 2px rgba(59,130,246,.12);
    }

    /* table row hover */
    .rhl:hover td { filter: brightness(.97); }

    /* padrões de importância */
    .imp-moderada { background: repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(234,179,8,.18) 2px, rgba(234,179,8,.18) 4px) !important; border-left: 4px solid #eab308; }
    .imp-urgente { background: repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(239,68,68,.18) 2px, rgba(239,68,68,.18) 4px) !important; border-left: 4px solid #ef4444; }


    /* rich editor color option hover */
    .copt:hover { background: rgba(128,128,128,.1) !important; }

    /* contenteditable placeholder */
    [contenteditable]:empty:before {
      content: attr(data-placeholder);
      color: #94a3b8;
      pointer-events: none;
    }

    /* animations */
    @keyframes su {
      from { opacity: 0; transform: translateY(7px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .anim { animation: su .2s ease; }


    /* layout shell */
    #shell {
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background .2s, color .2s;
    }

    /* top panels never scroll */
    #top-panels { flex-shrink: 0; }

    /* table zone is the only scrollable area */
    #table-zone {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
      margin: 0 12px 8px;
      border-radius: 8px;
    }

    table { width: 100%; border-collapse: collapse; min-width: 720px; }
    th, td { text-align: left; }

    /* sticky table column headers inside scroll zone */
    thead th { position: sticky; top: 41px; z-index: 40; }

    button, label { cursor: pointer; font-family: inherit; }
    select, input, textarea { font-family: inherit; }
  </style>
</head>
<body>

<div id="shell"></div>

<script>
// ═══════════════════════════════════════════════════════════════
//  LIVRO DE OCORRÊNCIAS — standalone HTML
//  Salva tudo no localStorage do navegador.
//  Basta clicar duas vezes no arquivo para abrir.
// ═══════════════════════════════════════════════════════════════

const TIPOS = [
  { label:"BMS - HC",              color:"#1565C0" },
  { label:"BMS - JC",              color:"#0D47A1" },
  { label:"CFTV",                  color:"#37474F" },
  { label:"ELEVADORES",            color:"#827717" },
  { label:"HVAC - AJUSTE",         color:"#00838F" },
  { label:"HELIPONTO",             color:"#4E342E" },
  { label:"HVAC - CAG",            color:"#0097A7" },
  { label:"HVAC - CHILLER",        color:"#1565C0" },
  { label:"HVAC - OUTROS",         color:"#00695C" },
  { label:"MANUTENÇÃO",            color:"#2E7D32" },
  { label:"OBRAS",                 color:"#F57F17" },
  { label:"SCA",                   color:"#1A237E" },
  { label:"SDAI",                  color:"#6A1B9A" },
  { label:"SEGURANÇA",             color:"#B71C1C" },
  { label:"TURNO",                 color:"#01579B" },
  { label:"AR EXTRA",              color:"#00838F" },
  { label:"OCORRÊNCIA",            color:"#424242" },
  { label:"LIGA/DESLIGA",          color:"#E65100" },
  { label:"GERADOR",               color:"#2E7D32" },
  { label:"AJUSTE TEMPERATURA",    color:"#D84315" },
  { label:"SISTEMA EBO",           color:"#00695C" },
  { label:"SISTEMA EPO",           color:"#E65100" },
  { label:"OUTROS",                color:"#616161" },
];

const TEXT_COLORS = [
  { label:"Padrão",   value:null },
  { label:"Preto",    value:"#111827" },
  { label:"Azul",     value:"#1d4ed8" },
  { label:"Vermelho", value:"#dc2626" },
  { label:"Verde",    value:"#16a34a" },
  { label:"Amarelo",  value:"#ca8a04" },
  { label:"Laranja",  value:"#ea580c" },
  { label:"Cinza",    value:"#64748b" },
];

const STORAGE_KEY       = "livro_ocorrencias_v4";
const STORAGE_DARK      = "livro_dark_mode";
const STORAGE_OPERADOR  = "livro_operador_atual";
const STORAGE_OPERADORES = "livro_operadores_lista";
const STORAGE_FONTSIZE  = "livro_font_size";
const STORAGE_OPERADORES_DELETED = "livro_operadores_deletados";

// ── helpers ──────────────────────────────────────────────────
const fmtDate = d   => { if(!d)return""; const[y,m,dd]=d.split("-"); return`${dd}/${m}/${y}`; };
const fmtTS   = iso => { if(!iso)return""; return new Date(iso).toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}); };
const fmtNow  = ()  => new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
const uid     = ()  => Date.now().toString(36)+Math.random().toString(36).slice(2);
const getTipo = l   => TIPOS.find(t=>t.label===l)||{color:"#424242"};
const strip   = h   => (h||"").replace(/<[^>]*>/g,"").trim();
const esc     = s   => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

// ── storage ───────────────────────────────────────────────────
function save(records) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(records)); return true; }
  catch(e) {
    try {
      Object.keys(localStorage).filter(k=>k!==STORAGE_KEY&&k!==STORAGE_DARK).forEach(k=>localStorage.removeItem(k));
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records)); return true;
    } catch { return false; }
  }
}
function load() {
  try { const r=localStorage.getItem(STORAGE_KEY); return r?JSON.parse(r):[]; } catch { return []; }
}

// ── helpers operadores ────────────────────────────────────────
function loadOperadores() { try { const o=localStorage.getItem(STORAGE_OPERADORES); return o?JSON.parse(o):[]; } catch { return []; } }
function saveOperadores(list) { try { localStorage.setItem(STORAGE_OPERADORES, JSON.stringify(list)); } catch {} }
function loadDeletedOperadores() { try { const d=localStorage.getItem(STORAGE_OPERADORES_DELETED); return d?JSON.parse(d):[]; } catch { return []; } }
function saveDeletedOperadores(list) { try { localStorage.setItem(STORAGE_OPERADORES_DELETED, JSON.stringify(list)); } catch {} }
function getOperadores() { const deleted=new Set(loadDeletedOperadores()); const fromRecords=[...new Set(records.map(r=>r.operador||'').filter(Boolean))]; const fromStorage=loadOperadores(); return [...new Set([...fromRecords,...fromStorage])].filter(o=>!deleted.has(o)).sort(); }

// ── app state ─────────────────────────────────────────────────
let dark    = localStorage.getItem(STORAGE_DARK)==="1";
let records = load();
let view    = "log";       // "log" | "relatorio"
let sortDir = "desc";
let editId  = null;
let inForm  = {};
let savedAt = null;
let activeColorPicker = null; // "form" | "inline" | null
let operadorAtual = localStorage.getItem(STORAGE_OPERADOR) || "";
let fontSize = localStorage.getItem(STORAGE_FONTSIZE) || "14";

const emptyForm = () => ({
  data: new Date().toISOString().slice(0,10),
  hora: new Date().toTimeString().slice(0,5),
  tipo:"", descricao:"", operador:operadorAtual, importancia:"nenhuma",
  _descHTML: "",    // rich html for form editor
});
let form = emptyForm();

let hf = {tipo:"",operador:"",de:"",ate:"",hora:""};
let selectedMonth = new Date().toISOString().slice(0,7);
let panelOpen = null;
let rf = {tipo:"",operador:"",de:"",ate:""};

// persist + timestamp
function persist() {
  if(save(records)) { savedAt=fmtNow(); render(); }
}
window.addEventListener("beforeunload", ()=>save(records));

// ── filters ──────────────────────────────────────────────────
function applyF(list, f) {
  return list.filter(o=>{
    if(f.de   && o.data<f.de)  return false;
    if(f.ate  && o.data>f.ate) return false;
    if(f.tipo && o.tipo!==f.tipo) return false;
    if(f.operador && !( o.operador||"").toLowerCase().includes(f.operador.toLowerCase())) return false;
    if(f.hora && !(o.hora||"").startsWith(f.hora)) return false;
    return true;
  });
}
function sorted(list) {
  return [...list].sort((a,b)=>{
    const da=a.data+(a.hora||""), db=b.data+(b.hora||"");
    return sortDir==="desc"?db.localeCompare(da):da.localeCompare(db);
  });
}

// ── theme ────────────────────────────────────────────────────
function theme() {
  return dark ? {
    bg:"#111827", surface:"#1a2232", surface2:"#1e2a3a", border:"#2d3f55",
    text:"#e2e8f0", muted:"#64748b", faint:"#374151", inputBg:"#161e2e",
    header:"#0c1220", navAc:"#6abf40", navAcBg:"#0f2a0a",
    rEven:"#1a2232", rOdd:"#172030", thBg:"#0f1624",
    edBg:"#1e2530", edBorder:"#374151", edTbBg:"#1e2530", edTc:"#e2e8f0",
  } : {
    bg:"#d6dee2", surface:"#edf1f3", surface2:"#e4ebee", border:"#b8c8d0",
    text:"#1e293b", muted:"#526270", faint:"#94a3b8", inputBg:"#fff",
    header:"#c8d4da", navAc:"#52A82C", navAcBg:"#d4edca",
    rEven:"#edf1f3", rOdd:"#e7edef", thBg:"#dde5e9",
    edBg:"#fff", edBorder:"#cbd5e1", edTbBg:"#e6f5dc", edTc:"#1e293b",
  };
}

// ── toast ────────────────────────────────────────────────────
let toastTimer = null;
function toast(msg, type="ok") {
  const el = document.getElementById("toast");
  if(!el) return;
  const colors = {
    ok:   { bg:"#f0fdf4", bd:"#bbf7d0", tx:"#16a34a" },
    err:  { bg:"#fef2f2", bd:"#fca5a5", tx:"#dc2626" },
    info: { bg:"#eff6ff", bd:"#bfdbfe", tx:"#2563eb" },
  };
  const c = colors[type]||colors.ok;
  el.style.cssText = `position:fixed;bottom:18px;right:18px;border:1px solid ${c.bd};border-radius:6px;padding:9px 16px;font-size:11px;font-weight:600;z-index:999;font-family:inherit;animation:su .2s ease;background:${c.bg};color:${c.tx};display:block;`;
  el.textContent = msg;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ el.style.display="none"; }, 3200);
}

// ── CSV ──────────────────────────────────────────────────────
function buildCSV(list) {
  const header = ["DATA","HORA","TIPO","OPERADOR","DESCRIÇÃO","REGISTRADO EM"];
  const rows = sorted(list).map(o=>[
    fmtDate(o.data), o.hora||"", o.tipo, o.operador||"",
    '"'+strip(o.descricao).replace(/"/g,'""')+'"',
    fmtTS(o.createdAt),
  ]);
  return [header,...rows].map(r=>r.join(";")).join("\n");
}
function exportCSV() {
  const list = (rf.de||rf.ate||rf.tipo||rf.operador)?applyF(records,rf):records;
  const blob = new Blob(["\uFEFF"+buildCSV(list)],{type:"text/csv;charset=utf-8;"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "ocorrencias_"+new Date().toISOString().slice(0,10)+".csv";
  a.click(); URL.revokeObjectURL(a.href);
  toast("CSV exportado!");
}
function saveBackup() {
  const blob = new Blob([JSON.stringify(records,null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "livro_backup_"+new Date().toISOString().slice(0,10)+".json";
  a.click(); URL.revokeObjectURL(a.href);
  toast("Backup JSON salvo!");
}
function importFile(e) {
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(!Array.isArray(d))throw new Error();
      records=d; persist(); toast(d.length+" registros importados.");
    } catch{ toast("Arquivo inválido.","err"); }
  };
  r.readAsText(f); e.target.value="";
}

// ── render helpers ────────────────────────────────────────────
function inp(id, type, val, placeholder, extraStyle) {
  const T=theme();
  const base=`background:${T.inputBg};border:1px solid ${T.border};border-radius:5px;color:${T.text};padding:8px 11px;font-size:13px;font-family:inherit;width:100%;${extraStyle||""}`;
  if(type==="select") {
    // val is [options array], selected is placeholder
    return ""; // handled separately
  }
  return `<input id="${id}" type="${type}" value="${esc(val)}" placeholder="${esc(placeholder||"")}" style="${base}" oninput="onInput('${id}')">`;
}

function richEditorHTML(id, html, T, importancia) {
  const colorBtns = TEXT_COLORS.map(c=>`
    <button class="copt" onmousedown="event.preventDefault();applyColor('${id}',${c.value?`'${c.value}'`:'null'})"
      style="display:flex;align-items:center;gap:7px;background:none;border:none;cursor:pointer;padding:5px 5px;border-radius:4px;font-size:12px;font-family:inherit;color:${T.edTc};width:100%;text-align:left;">
      <span style="width:12px;height:12px;border-radius:50%;background:${c.value||"transparent"};border:1px solid ${T.edBorder};display:inline-block;flex-shrink:0;"></span>
      ${c.label}
    </button>`).join("");

  return `
  <div style="border:1px solid ${T.edBorder};border-radius:6px;background:${T.edBg};">
    <div style="display:flex;align-items:center;gap:4px;padding:4px 8px;border-bottom:1px solid ${T.edBorder};background:${T.edTbBg};flex-wrap:wrap;">
      <select onchange="edExec('${id}','fontSize',this.value);this.value='0';" style="background:none;border:1px solid ${T.edBorder};border-radius:4px;padding:2px 5px;cursor:pointer;font-family:inherit;color:${T.edTc};font-size:10px;line-height:1;">
        <option value="0">Tamanho</option>
        <option value="1">10px</option>
        <option value="2">12px</option>
        <option value="3">14px</option>
        <option value="4">16px</option>
        <option value="5">18px</option>
        <option value="6">20px</option>
      </select>
      <button style="background:none;border:1px solid ${T.edBorder};border-radius:4px;padding:3px 9px;cursor:pointer;font-family:inherit;color:${T.edTc};line-height:1;" onmousedown="event.preventDefault();edExec('${id}','bold')"><b>B</b></button>
      <button style="background:none;border:1px solid ${T.edBorder};border-radius:4px;padding:3px 9px;cursor:pointer;font-family:inherit;color:${T.edTc};line-height:1;" onmousedown="event.preventDefault();edExec('${id}','italic')"><i>I</i></button>
      <button style="background:none;border:1px solid ${T.edBorder};border-radius:4px;padding:3px 9px;cursor:pointer;font-family:inherit;color:${T.edTc};line-height:1;" onmousedown="event.preventDefault();edExec('${id}','underline')"><u>U</u></button>
      <div style="width:1px;height:18px;background:${T.edBorder};margin:0 2px;"></div>
      <div style="position:relative;">
        <button id="${id}-cpbtn" style="background:none;border:1px solid ${T.edBorder};border-radius:4px;padding:3px 9px;cursor:pointer;font-family:inherit;color:${T.edTc};line-height:1;display:flex;align-items:center;gap:5px;"
          onmousedown="event.preventDefault();toggleCP('${id}')">
          <span id="${id}-cplabel" style="font-weight:700;color:${T.edTc};border-bottom:2px solid ${T.edTc};line-height:1;font-size:13px;">A</span>
          <span style="font-size:9px;color:#94a3b8;">▼</span>
        </button>
        <div id="${id}-cpdrop" style="display:none;position:absolute;top:110%;left:0;z-index:800;background:${T.edBg};border:1px solid ${T.edBorder};border-radius:7px;padding:8px 10px;box-shadow:0 6px 20px rgba(0,0,0,.18);min-width:135px;">
          <div style="font-size:9px;font-weight:700;letter-spacing:.1em;color:#94a3b8;margin-bottom:6px;">COR DO TEXTO</div>
          ${colorBtns}
        </div>
      </div>
      <div style="width:1px;height:18px;background:${T.edBorder};margin:0 2px;"></div>
      <button style="background:none;border:1px solid ${T.edBorder};border-radius:4px;padding:3px 10px;cursor:pointer;font-family:inherit;color:${T.edTc};line-height:1;font-size:11px;"
        onmousedown="event.preventDefault();edExec('${id}','removeFormat');resetCPLabel('${id}')">Sem Formatação</button>
      <div style="width:1px;height:18px;background:${T.edBorder};margin:0 2px;"></div>
      ${id.includes('form')?`<select id="${id}-import" onchange="onInput('${id}-import')" style="background:none;border:1px solid ${T.edBorder};border-radius:4px;padding:3px 8px;cursor:pointer;font-family:inherit;color:${T.edTc};font-size:11px;" title="Sinalizar importância"><option value="nenhuma" ${importancia==="nenhuma"?"selected":""}>🚩 SINALIZAR</option><option value="moderada" ${importancia==="moderada"?"selected":""}>🟨 Moderada</option><option value="urgente" ${importancia==="urgente"?"selected":""}>🔴 Urgente</option></select>`:''}
    </div>
    <div id="${id}" contenteditable="true" data-placeholder="Descreva detalhadamente a ocorrência, incluindo circunstâncias, envolvidos e medidas tomadas..."
      oninput="onEditorInput('${id}')"
      onpaste="handlePaste(event)"
      style="min-height:58px;padding:6px 10px;font-size:13px;line-height:1.7;color:${T.edTc};outline:none;font-family:'Open Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;word-break:break-word;background:${T.edBg};"
    >${html||""}</div>
  </div>`;
}

// ── editor helpers ────────────────────────────────────────────
function handlePaste(event) {
  event.preventDefault();
  const text = (event.clipboardData || window.clipboardData).getData("text/plain");
  document.execCommand("insertText", false, text);
}
function edExec(id, cmd, val) {
  const el=document.getElementById(id);
  if(!el)return;
  el.focus();
  document.execCommand(cmd,false,val||null);
  onEditorInput(id);
}
function toggleCP(id) {
  const drop=document.getElementById(id+"-cpdrop");
  if(!drop)return;
  const visible=drop.style.display!=="none";
  // close all open pickers first
  document.querySelectorAll("[id$='-cpdrop']").forEach(d=>d.style.display="none");
  if(!visible) drop.style.display="block";
}
function applyColor(id, color) {
  const drop=document.getElementById(id+"-cpdrop");
  if(drop) drop.style.display="none";
  const label=document.getElementById(id+"-cplabel");
  if(label){ label.style.color=color||theme().edTc; label.style.borderBottomColor=color||theme().edTc; }
  edExec(id,"foreColor",color||theme().edTc);
}
function resetCPLabel(id) {
  const label=document.getElementById(id+"-cplabel");
  if(label){ label.style.color=theme().edTc; label.style.borderBottomColor=theme().edTc; }
  onEditorInput(id);
}
function onEditorInput(id) {
  const el=document.getElementById(id);
  if(!el)return;
  if(id==="form-desc") {
    form.descricao=el.innerHTML;
  } else if(id==="inline-desc") {
    inForm.descricao=el.innerHTML;
  }
}

// close color pickers when clicking outside
document.addEventListener("mousedown", e=>{
  if(!e.target.closest("[id$='-cpdrop']") && !e.target.closest("[id$='-cpbtn']")) {
    document.querySelectorAll("[id$='-cpdrop']").forEach(d=>d.style.display="none");
  }
});

// ── input binding ─────────────────────────────────────────────
function onInput(id) {
  const el=document.getElementById(id); if(!el)return;
  const v=el.value;
  if(id==="f-data")    { form.data=v; return; }
  if(id==="f-hora")    { form.hora=v; return; }
  if(id==="f-tipo")    { form.tipo=v; render(); return; }
  if(id==="f-oper")    { form.operador=v; return; }
  if(id==="f-import")  { form.importancia=v; return; }
  if(id==="form-desc-import") { form.importancia=v; return; }
  // history filters
  if(id==="hf-tipo")   { hf.tipo=v; render(); return; }
  if(id==="hf-oper")   { hf.operador=v; render(); return; }
  if(id==="hf-de")     { hf.de=v; render(); return; }
  if(id==="hf-ate")    { hf.ate=v; render(); return; }
  if(id==="hf-hora")   { hf.hora=v; render(); return; }
  // report filters
  if(id==="rf-de")     { rf.de=v; render(); return; }
  if(id==="rf-ate")    { rf.ate=v; render(); return; }
  if(id==="rf-tipo")   { rf.tipo=v; render(); return; }
  if(id==="rf-oper")   { rf.operador=v; render(); return; }
  // inline edit
  if(id==="ie-data")   { inForm.data=v; return; }
  if(id==="ie-hora")   { inForm.hora=v; return; }
  if(id==="ie-tipo")   { inForm.tipo=v; render(); return; }
  if(id==="ie-oper")   { inForm.operador=v; return; }
  if(id==="ie-import") { inForm.importancia=v; return; }
}

// ── CRUD ──────────────────────────────────────────────────────
function addRecord() {
  const descEl=document.getElementById("form-desc");
  if(descEl) form.descricao=descEl.innerHTML;
  if(!form.data||!form.tipo||!strip(form.descricao)){
    toast("Preencha data, tipo e descrição.","err"); return;
  }
  records.unshift({...form, id:uid(), createdAt:new Date().toISOString()});
  persist();
  const prevOp=form.operador;
  form=emptyForm(); form.operador=prevOp;
  panelOpen=null;
  toast("Ocorrência registrada.");
  render();
}

function startEdit(id) {
  const o=records.find(r=>r.id===id); if(!o)return;
  const tableZone=document.getElementById('table-zone');
  const scrollPos=tableZone?tableZone.scrollTop:0;
  editId=id;
  inForm={data:o.data,hora:o.hora,tipo:o.tipo,descricao:o.descricao,operador:o.operador||"",importancia:o.importancia||"nenhuma"};
  render();
  if(tableZone) setTimeout(()=>tableZone.scrollTop=scrollPos,0);
  // set rich editor content after render
  setTimeout(()=>{
    const el=document.getElementById("inline-desc");
    if(el){ el.innerHTML=inForm.descricao||""; }
  },0);
}
function saveEdit() {
  const descEl=document.getElementById("inline-desc");
  if(descEl) inForm.descricao=descEl.innerHTML;
  if(!inForm.data||!inForm.tipo||!strip(inForm.descricao)){
    toast("Preencha todos os campos.","err"); return;
  }
  records=records.map(o=>o.id===editId?{...o,...inForm,updatedAt:new Date().toISOString()}:o);
  editId=null; persist(); toast("Atualizado."); render();
}
function cancelEdit() { editId=null; render(); }

let pendingDelete=null;
function confirmDelete(id) {
  pendingDelete=id;
  document.getElementById("modal").style.display="flex";
}
function doDelete() {
  records=records.filter(o=>o.id!==pendingDelete);
  pendingDelete=null;
  document.getElementById("modal").style.display="none";
  persist(); toast("Excluído.","info"); render();
}
function cancelDelete() {
  pendingDelete=null;
  document.getElementById("modal").style.display="none";
}

function setView(v)    { view=v;    render(); }
function setSortDir()  { sortDir=sortDir==="desc"?"asc":"desc"; render(); }
function clearHF()     { hf={tipo:"",operador:"",de:"",ate:"",hora:""}; render(); }
function setMonth(v)   { selectedMonth=v; render(); }
function toggleDark()  { dark=!dark; localStorage.setItem(STORAGE_DARK,dark?"1":"0"); render(); }
function togglePanel(name) { panelOpen = (panelOpen===name)?null:name; render(); }
function setFontSize(size) { fontSize = size; localStorage.setItem(STORAGE_FONTSIZE, size); document.documentElement.style.fontSize = size + "px"; render(); }
function setOperador(nome) { operadorAtual = nome; localStorage.setItem(STORAGE_OPERADOR, nome); form.operador = nome; render(); }
function deleteOperador(nome) {
  if(confirm(`Deletar operador "${nome}"?`)) {
    const list = loadOperadores().filter(o => o !== nome);
    saveOperadores(list);
    const deleted = loadDeletedOperadores();
    if(!deleted.includes(nome)) deleted.push(nome);
    saveDeletedOperadores(deleted);
    if(operadorAtual === nome) { operadorAtual = ""; localStorage.setItem(STORAGE_OPERADOR, ""); form.operador = ""; }
    render();
  }
}
function addOperador() {
  const nome = document.getElementById('novo-oper').value.trim();
  if(nome) {
    const list = loadOperadores();
    if(!list.includes(nome)) { list.push(nome); saveOperadores(list); }
    setOperador(nome);
    document.getElementById('novo-oper').value = "";
    panelOpen = null;
    render();
  }
}

// ── SELECT helper ──────────────────────────────────────────────
function selectHTML(id, selected, options, extraStyle, onChange) {
  const T=theme();
  const style=`background:${T.inputBg};border:1px solid ${T.border};border-radius:5px;color:${selected?T.text:T.faint};padding:8px 11px;font-size:13px;font-family:inherit;width:100%;cursor:pointer;${extraStyle||""}`;
  const opts=options.map(o=>`<option value="${esc(o.value||o)}" ${(o.value||o)===selected?"selected":""}>${esc(o.label||o)}</option>`).join("");
  return `<select id="${id}" style="${style}" onchange="onInput('${id}')">${opts}</select>`;
}
function tipoOptions(blank) {
  return [blank||"", ...TIPOS.map(t=>({value:t.label,label:t.label}))];
}

    </div>` : ""}
    ` : `
    ${panelOpen==='rfiltros' ? `<div style="padding:10px 12px;background:${T.surface};border-bottom:1px solid ${T.border};">
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;">
        <div>${LBL("DATA INICIAL")}${INP("rf-de","date",rf.de)}</div>
        <div>${LBL("DATA FINAL")}${INP("rf-ate","date",rf.ate)}</div>
        <div>${LBL("TIPO")}${mkTipoSel("rf-tipo",rf.tipo)}</div>
        <div>${LBL("OPERADOR")}${INP("rf-oper","text",rf.operador,"Filtrar por operador")}</div>
      </div>
      ${summaryHTML}
    </div>` : ""}
    `}
  </div>>

  <!-- TABLE ZONE (split: fixed header + scrollable rows) -->
  <div id="table-zone" style="flex:1 1 0;min-height:0;display:flex;flex-direction:column;margin:0 18px 10px;background:${T.surface};border:1px solid ${T.border};border-radius:8px;box-shadow:${dark?"0 2px 8px rgba(0,0,0,.25)":"0 1px 4px rgba(0,0,0,.06)"};">

    <!-- FIXED HEADER SECTION (sticky bar + table header) -->
    <div style="flex-shrink:0;border-top-left-radius:8px;border-top-right-radius:8px;">
      <!-- Sticky bar -->
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:7px 14px;background:${T.thBg};border-bottom:1px solid ${T.border};">
        <span style="font-size:10px;font-weight:700;letter-spacing:.1em;color:${T.muted};white-space:nowrap;">
          ${view==="relatorio"?"RELATÓRIO — "+relList.length+" REGISTROS":"HISTÓRICO — "+histList.length+" DE "+records.length}
        </span>
        ${view==="log" ? (()=>{
          const monthSet=new Set(records.map(o=>(o.data||"").slice(0,7)).filter(Boolean));
          monthSet.add(new Date().toISOString().slice(0,7));
          const months=Array.from(monthSet).sort((a,b)=>b.localeCompare(a));
          const mLabel=m=>{ const [y,mo]=m.split("-"); return ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"][parseInt(mo,10)-1]+" "+y; };
          const opts=months.map(m=>`<option value="${m}" ${m===selectedMonth?"selected":""} >${mLabel(m)}</option>`).join("");
          return `<select onchange="setMonth(this.value)" style="background:${T.inputBg};border:1px solid ${T.border};border-radius:5px;color:${T.text};padding:4px 8px;font-size:11px;font-family:inherit;cursor:pointer;font-weight:600;"><option value="" ${!selectedMonth?"selected":""}>Todos os meses</option>${opts}</select>`;
        })() : ""}
        <button onclick="setSortDir()" style="background:none;border:1px solid ${T.border};color:${T.muted};font-size:10px;padding:3px 10px;cursor:pointer;border-radius:4px;font-family:inherit;margin-left:auto;white-space:nowrap;">
          ${sortDir==="desc"?"↓ Mais recente":"↑ Mais antigo"}
        </button>
      </div>

      <!-- Header table (fixed, no scrolling) -->
      <table style="width:100%;table-layout:fixed;border-collapse:collapse;">
        <colgroup>
          <col style="width:95px">
          <col style="width:65px">
          <col style="width:170px">
          <col style="width:130px">
          <col>
          ${view==="log"?'<col style="width:80px">':''}
        </colgroup>
        <thead>
          <tr>${colHeaders.map(h=>`<th style="${["DATA","HORA","TIPO DE OCORRÊNCIA","OPERADOR","AÇÕES"].includes(h)?thNarrow:thStyle}">${h}</th>`).join("")}</tr>
        </thead>
      </table>
    </div>

    <!-- SCROLLABLE ROWS SECTION -->
    <div style="flex:1 1 0;min-height:0;overflow-y:auto;overflow-x:auto;border-bottom-left-radius:8px;border-bottom-right-radius:8px;border-top:1px solid ${T.border};">
      ${rows.length===0 ? `
        <div style="text-align:center;padding:40px 16px;color:${T.faint};">
          <div style="font-size:28px;margin-bottom:8px;color:${T.muted};">∼</div>
          <div style="font-size:11px;">Nenhuma ocorrência encontrada</div>
        </div>` : `
        <table style="width:100%;table-layout:fixed;border-collapse:collapse;">
          <colgroup>
            <col style="width:95px">
            <col style="width:65px">
            <col style="width:170px">
            <col style="width:130px">
            <col>
            ${view==="log"?'<col style="width:80px">':''}
          </colgroup>
          <tbody>${tableRows}</tbody>
        </table>`}
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" style="display:none;"></div>

  <!-- MODAL DELETE -->
  <div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center;z-index:300;">
    <div style="background:${T.surface};border:1px solid ${T.border};border-radius:10px;padding:20px 24px;min-width:280px;box-shadow:0 8px 32px rgba(0,0,0,.2);">
      <div style="font-size:14px;font-weight:700;margin-bottom:8px;color:${T.text};">⚠️ Confirmar Exclusão</div>
      <div style="font-size:12px;color:${T.muted};margin-bottom:20px;">Deseja excluir este registro permanentemente?</div>
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button onclick="cancelDelete()" style="background:none;border:1px solid ${T.border};color:${T.muted};border-radius:5px;padding:7px 16px;font-size:12px;cursor:pointer;font-family:inherit;">Cancelar</button>
        <button onclick="doDelete()" style="background:#dc2626;color:#fff;border:none;border-radius:5px;padding:7px 16px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:700;">Excluir</button>
      </div>
    </div>
  </div>
  `;

  // restore inline editor content after re-render
  if(editId) {
    setTimeout(()=>{
      const el=document.getElementById("inline-desc");
      if(el && !el.innerHTML) el.innerHTML=inForm.descricao||"";
    },0);
  }
}

// ── INIT ──────────────────────────────────────────────────────
document.documentElement.style.fontSize = fontSize + "px";
render();
// mark as saved on load if data exists
if(records.length>0) { savedAt=fmtNow(); }
</script>
</body>
</html>
